<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAH BCA CET Response Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
    }

    .upload-box {
      border: 2px dashed #2563eb;
      padding: 30px;
      text-align: center;
      border-radius: 10px;
      background: #eff6ff;
      margin-top: 20px;
    }

    input[type="file"] {
      margin-top: 15px;
    }

    .result {
      margin-top: 30px;
      display: none;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      padding: 20px;
      border-radius: 10px;
      color: white;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .correct { background: #16a34a; }
    .wrong { background: #dc2626; }
    .total { background: #2563eb; }
    .score { background: #7c3aed; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
    }

    table, th, td {
      border: 1px solid #ddd;
    }

    th {
      background: #1e40af;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      text-align: center;
    }

    .correct-row {
      background: #dcfce7;
    }

    .wrong-row {
      background: #fee2e2;
    }

    .footer {
      margin-top: 25px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MAH BCA CET Response Analyzer</h1>

    <div class="upload-box">
      <p><strong>Upload your MAH CET Response Sheet HTML file</strong></p>
      <input type="file" id="fileInput" accept=".html,.htm" />
    </div>

    <div class="result" id="resultSection">
      <div class="cards">
        <div class="card total">
          Total Questions<br>
          <span id="totalQuestions">0</span>
        </div>

        <div class="card correct">
          Correct Answers<br>
          <span id="correctAnswers">0</span>
        </div>

        <div class="card wrong">
          Wrong Answers<br>
          <span id="wrongAnswers">0</span>
        </div>

        <div class="card score">
          Estimated Score<br>
          <span id="score">0</span>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Question ID</th>
            <th>Correct Option</th>
            <th>Your Response</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="footer">
      Built for MAH BCA CET Response Sheet Analysis
    </div>
  </div>

  <script>
    document.getElementById('fileInput').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        const htmlContent = e.target.result;

        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, 'text/html');

        const tables = doc.querySelectorAll('table.table.table-responsive.table-bordered.center');

        let correct = 0;
        let wrong = 0;
        let total = 0;

        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        tables.forEach((table, index) => {
          const spans = table.querySelectorAll('span');

          if (spans.length >= 2) {
            const correctOption = spans[0].textContent.trim();
            const candidateResponse = spans[1].textContent.trim();

            const questionRow = table.closest('tr');
            let questionId = 'N/A';

            if (questionRow) {
              const firstTd = questionRow.querySelector('td');
              if (firstTd) {
                questionId = firstTd.textContent.trim();
              }
            }

            const isCorrect = correctOption === candidateResponse;

            if (isCorrect) {
              correct++;
            } else {
              wrong++;
            }

            total++;

            const row = document.createElement('tr');
            row.className = isCorrect ? 'correct-row' : 'wrong-row';

            row.innerHTML = `
              <td>${questionId}</td>
              <td>${correctOption}</td>
              <td>${candidateResponse || 'Not Answered'}</td>
              <td>${isCorrect ? '✅ Correct' : '❌ Wrong'}</td>
            `;

            tableBody.appendChild(row);
          }
        });

        document.getElementById('totalQuestions').textContent = total;
        document.getElementById('correctAnswers').textContent = correct;
        document.getElementById('wrongAnswers').textContent = wrong;
        document.getElementById('score').textContent = correct;

        document.getElementById('resultSection').style.display = 'block';
      };

      reader.readAsText(file);
    });
  </script>
</body>
</html>
